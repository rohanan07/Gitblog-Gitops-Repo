apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: gitblog
  annotations:
    # helm hooks, use when deploying the application using helm
    # "helm.sh/hook": pre-install,pre-upgrade
    # "helm.sh/hook-weight": "-1"
    # "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation

    # argocd hooks, use when deploying the appliction using argocd
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-init
          image: postgres:16
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: gitblog-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: gitblog-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: gitblog-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitblog-secret
                  key: DB_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting database initialization..."
              
              # FIX: Use connection URI format. This passes user, password, host, 
              # and SSL requirements all cleanly in a single, un-prompable string.
              psql "postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}?sslmode=require" <<EOF

              CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

              CREATE TABLE IF NOT EXISTS users (
                  id UUID PRIMARY KEY,
                  name VARCHAR(100) NOT NULL,
                  email VARCHAR(255) UNIQUE NOT NULL,
                  password_hash TEXT NOT NULL,
                  created_at TIMESTAMP DEFAULT NOW()
              );

              CREATE TABLE IF NOT EXISTS posts (
                  id UUID PRIMARY KEY,
                  title VARCHAR(255) NOT NULL,
                  content TEXT NOT NULL,
                  author_id UUID REFERENCES users(id) ON DELETE CASCADE,
                  created_at TIMESTAMP DEFAULT NOW(),
                  updated_at TIMESTAMP DEFAULT NOW()
              );

              EOF
              echo "Database schema applied successfully."